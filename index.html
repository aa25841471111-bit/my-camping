<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豬二哥野外探險記</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #B9AFA9;
            --main-green: #5B6356;
            --btn-gray: #A1A9AF;
            --border-color: #999;
            --base-font-size: 20px; 
            --jiaming-blue: #2E5266; /* 家銘車深藍色 */
            --arctic-dark: #435058;  /* 北極車深灰色 */
        }
        body { margin: 0; background-color: var(--bg-color); font-family: sans-serif; display: flex; justify-content: center; font-size: var(--base-font-size); }
        #app { width: 100%; max-width: 500px; padding-bottom: 50px; }
        
        header { background-color: var(--main-green); color: white; padding: 20px; text-align: center; }
        header img { width: 100%; border-radius: 5px; display: block; }
        header h2 { margin: 15px 0 0 0; font-size: 28px; }

        .notice { padding: 20px; font-size: 18px; line-height: 1.8; border-bottom: 1px solid var(--border-color); }
        .notice a { color: #2D5A27; text-decoration: underline; font-weight: bold; }

        .section-title { padding: 25px 20px 10px; font-size: 24px; font-weight: bold; }

        /* 車輛專屬標題樣式 */
        .car-header { color: white; margin: 20px 10px 10px; padding: 12px 20px; border-radius: 8px; font-size: 22px; font-weight: bold; }
        .bg-jiaming { background-color: var(--jiaming-blue); }
        .bg-arctic { background-color: var(--arctic-dark); }

        /* 認領按鈕區 */
        .btn-grid { display: flex; flex-direction: column; gap: 12px; padding: 0 30px; }
        .btn-item-wrapper { display: flex; align-items: center; gap: 12px; }
        .item-btn { flex-grow: 1; background-color: var(--btn-gray); border: 1px solid #888; border-radius: 25px; padding: 15px; color: #333; cursor: pointer; text-align: center; font-weight: bold; font-size: 20px; }
        .del-opt { cursor: pointer; color: #777; font-size: 18px; padding: 5px; }

        table { width: 95%; margin: 10px auto; border-collapse: collapse; background: rgba(255,255,255,0.2); }
        th, td { border: 1px solid var(--border-color); padding: 8px; text-align: center; font-size: 16px; }
        .name-input { width: 90px !important; height: 30px; text-align: center; font-size: 16px; border: 1px solid #ccc; border-radius: 4px; }

        .input-group { padding: 15px 30px; display: flex; flex-direction: column; gap: 12px; }
        .big-input { border-radius: 10px; border: 2px solid var(--main-green); padding: 20px; background: #FFF; font-size: 22px; width: 100%; box-sizing: border-box; }
        .submit-btn { background-color: var(--main-green); color: white; border: none; padding: 18px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 22px; }

        .list-box { padding: 0 20px; }
        .list-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding: 12px 0; }
        input[type="checkbox"] { width: 28px; height: 28px; cursor: pointer; }
        .del-btn { background: none; border: none; cursor: pointer; font-size: 22px; padding: 5px; }

        .paid-status { font-size: 14px; color: #2D5A27; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <img src="Home (1).jpg" alt="Banner">
        <h2>豬二哥野外探險記</h2>
    </header>

    <div class="notice">
        <strong>必看公告</strong><br>
        • 地點：新竹尖石 自然野趣<br>
        • <a href="https://maps.app.goo.gl/ChIJp86ImF4VaDQR5WYs-_aUpVI" target="_blank">點我看地圖連結</a><br>
        • 時間：下午2點集合<br>
        • 收費：2000元/人 (可用Line Pay或轉帳備註人名)<br>
        • 帳號：(808) 0015977168920
    </div>

    <div class="section-title">👥 參與人員與繳費狀態</div>
    <div class="list-box">
        <div v-for="(person, i) in memberList" :key="i" class="list-item">
            <div style="display: flex; align-items: center;">
                <input type="checkbox" v-model="person.paid" @change="save">
                <div style="margin-left: 15px;">
                    <span :style="person.paid ? 'color: #2D5A27; font-weight: bold;' : ''">{{ person.name }}</span>
                    <span v-if="person.paid" class="paid-status" style="margin-left: 10px;">(已繳費 ✓)</span>
                </div>
            </div>
            <button class="del-btn" @click="removeMember(i)" style="font-size: 16px; color: #999;">✕</button>
        </div>
    </div>

    <hr style="margin: 40px 0; border: 1px dashed #666;">

    <div class="section-title">📦 認領物品 (點擊認領)</div>
    <div class="btn-grid">
        <div v-for="(obj, index) in options" :key="index" class="btn-item-wrapper">
            <div class="item-btn" @click="claimItem(obj)">{{ obj }}</div>
            <span class="del-opt" @click="removeOption(index)">✕</span>
        </div>
    </div>

    <div class="section-title">📝 認領清單 (細項)</div>
    <table>
        <thead>
            <tr><th>物品</th><th>誰領？</th><th>數量</th><th></th></tr>
        </thead>
        <tbody>
            <tr v-for="(claim, index) in claims" :key="index">
                <td>{{ claim.name }}</td>
                <td><input v-model="claim.user" @change="save" class="name-input"></td>
                <td><input v-model.number="claim.qty" @change="save" type="number" style="width:45px; text-align:center;"></td>
                <td><button class="del-btn" @click="removeClaim(index)">❌</button></td>
            </tr>
        </tbody>
    </table>

    <div class="input-group">
        <input v-model="newOption" class="big-input" placeholder="新增認領項目按鈕">
        <button class="submit-btn" @click="addOption">確認新增按鈕</button>
    </div>

    <hr style="margin: 40px 0; border: 1px dashed #666;">

    <div class="section-title">🍺 酒類與飲品</div>
    <div class="list-box">
        <div v-for="(drink, i) in drinkList" :key="i" class="list-item">
            <div>
                <input type="checkbox" v-model="drink.done" @change="save">
                <span :style="drink.done ? 'text-decoration: line-through; color: #777; margin-left:15px;' : 'margin-left:15px;'">{{ drink.name }}</span>
            </div>
            <button class="del-btn" @click="removeDrink(i)">❌</button>
        </div>
    </div>
    <div class="input-group">
        <input v-model="newDrink" class="big-input" placeholder="輸入酒水：如 啤酒">
        <button class="submit-btn" style="background-color: #8B4513;" @click="addDrink">確認新增飲品</button>
    </div>

    <hr style="margin: 40px 0; border: 1px dashed #666;">

    <div class="car-header bg-jiaming">🛒 採買清單 (家銘車)</div>
    <div class="list-box">
        <div v-for="(buy, i) in jiamingList" :key="i" class="list-item">
            <div>
                <input type="checkbox" v-model="buy.done" @change="save">
                <span :style="buy.done ? 'text-decoration: line-through; color: #777; margin-left:15px;' : 'margin-left:15px;'">{{ buy.name }}</span>
            </div>
            <button class="del-btn" @click="removeJiaming(i)">❌</button>
        </div>
    </div>
    <div class="input-group">
        <input v-model="newJiaming" class="big-input" placeholder="家銘車要買什麼？">
        <button class="submit-btn" style="background-color: var(--jiaming-blue);" @click="addJiaming">加入家銘車清單</button>
    </div>

    <hr style="margin: 20px 0; border: none;">

    <div class="car-header bg-arctic">🛒 採買清單 (北極車)</div>
    <div class="list-box">
        <div v-for="(buy, i) in arcticList" :key="i" class="list-item">
            <div>
                <input type="checkbox" v-model="buy.done" @change="save">
                <span :style="buy.done ? 'text-decoration: line-through; color: #777; margin-left:15px;' : 'margin-left:15px;'">{{ buy.name }}</span>
            </div>
            <button class="del-btn" @click="removeArctic(i)">❌</button>
        </div>
    </div>
    <div class="input-group">
        <input v-model="newArctic" class="big-input" placeholder="北極車要買什麼？">
        <button class="submit-btn" style="background-color: var(--arctic-dark);" @click="addArctic">加入北極車清單</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBhxHE_Mc_O70QBIn-TCOC7bvtOqfEdNCg",
        authDomain: "my-camping-eca2c.firebaseapp.com",
        databaseURL: "https://my-camping-eca2c-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-camping-eca2c",
        storageBucket: "my-camping-eca2c.firebasestorage.app",
        messagingSenderId: "1035241407296",
        appId: "1:1035241407296:web:13c6dcf0cb6b52d1cf30a5",
        measurementId: "G-VF178VHSMH"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const initialMembers = ["彭", "小茵", "北極", "小晴", "文元", "小惠", "安德", "洪", "豆豆", "kiki", "豆哥", "Louis", "米其林", "米其林女友", "家銘", "莊"];

    const { createApp } = Vue;
    createApp({
        data() {
            return {
                options: [], claims: [], drinkList: [],
                memberList: [],
                jiamingList: [], arcticList: [], // 兩車清單
                newOption: '', newDrink: '', newJiaming: '', newArctic: ''
            }
        },
        methods: {
            claimItem(name) {
                this.claims.push({ name: name, user: '', qty: 1 });
                this.save();
            },
            addOption() {
                if(this.newOption) { 
                    if(!this.options.includes(this.newOption)) { this.options.push(this.newOption); }
                    this.newOption = ''; this.save(); 
                }
            },
            removeOption(index) {
                if(confirm("要刪除這個物品按鈕嗎？")) { this.options.splice(index, 1); this.save(); }
            },
            removeClaim(index) {
                if(confirm("要刪除這筆認領紀錄嗎？")) { this.claims.splice(index, 1); this.save(); }
            },
            addDrink() {
                if(this.newDrink) { this.drinkList.push({ name: this.newDrink, done: false }); this.newDrink = ''; this.save(); }
            },
            removeDrink(index) {
                if(confirm("要刪除這個飲品項目嗎？")) { this.drinkList.splice(index, 1); this.save(); }
            },
            // 家銘車方法
            addJiaming() {
                if(this.newJiaming) { this.jiamingList.push({ name: this.newJiaming, done: false }); this.newJiaming = ''; this.save(); }
            },
            removeJiaming(index) {
                if(confirm("要從家銘車清單刪除嗎？")) { this.jiamingList.splice(index, 1); this.save(); }
            },
            // 北極車方法
            addArctic() {
                if(this.newArctic) { this.arcticList.push({ name: this.newArctic, done: false }); this.newArctic = ''; this.save(); }
            },
            removeArctic(index) {
                if(confirm("要從北極車清單刪除嗎？")) { this.arcticList.splice(index, 1); this.save(); }
            },
            removeMember(index) {
                if(confirm("要移除這位參與人員嗎？")) { this.memberList.splice(index, 1); this.save(); }
            },
            save() {
                db.ref('camping/').set({
                    options: JSON.parse(JSON.stringify(this.options)),
                    claims: JSON.parse(JSON.stringify(this.claims)),
                    drinkList: JSON.parse(JSON.stringify(this.drinkList)),
                    memberList: JSON.parse(JSON.stringify(this.memberList)),
                    jiamingList: JSON.parse(JSON.stringify(this.jiamingList)),
                    arcticList: JSON.parse(JSON.stringify(this.arcticList))
                });
            }
        },
        mounted() {
            db.ref('camping/').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    this.options = data.options || [];
                    this.claims = data.claims || [];
                    this.drinkList = data.drinkList || [];
                    this.jiamingList = data.jiamingList || [];
                    this.arcticList = data.arcticList || [];
                    if (data.memberList && data.memberList.length > 0) {
                        this.memberList = data.memberList;
                    } else {
                        this.memberList = initialMembers.map(name => ({ name: name, paid: false }));
                        this.save();
                    }
                } else {
                    this.memberList = initialMembers.map(name => ({ name: name, paid: false }));
                    this.save();
                }
            });
        }
    }).mount('#app');
</script>
</body>
</html>
