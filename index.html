<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>豬二哥野外探險記</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.3/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #B9AFA9;
            --main-green: #5B6356;
            --btn-gray: #A1A9AF;
            --border-color: #999;
        }
        body { margin: 0; background-color: var(--bg-color); font-family: sans-serif; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 450px; padding-bottom: 50px; }
        
        header { background-color: var(--main-green); color: white; padding: 20px; text-align: left; }
        header img { width: 100%; border-radius: 5px; display: block; }
        header h2 { margin: 15px 0 0 0; }

        .notice { padding: 20px; font-size: 14px; line-height: 1.8; border-bottom: 1px solid var(--border-color); }
        .notice a { color: #2D5A27; text-decoration: underline; font-weight: bold; }

        .section-title { padding: 20px 20px 10px; font-size: 18px; font-weight: bold; }

        .btn-grid { display: flex; flex-direction: column; gap: 8px; padding: 0 40px; }
        .btn-item-wrapper { display: flex; align-items: center; gap: 10px; }
        .item-btn { flex-grow: 1; background-color: var(--btn-gray); border: 1px solid #888; border-radius: 20px; padding: 12px; color: #333; cursor: pointer; text-align: center; font-weight: bold; }
        .del-opt { cursor: pointer; color: #777; font-size: 14px; }

        table { width: 95%; margin: 10px auto; border-collapse: collapse; background: rgba(255,255,255,0.2); }
        th, td { border: 1px solid var(--border-color); padding: 8px; text-align: center; font-size: 14px; }

        .input-group { padding: 10px 40px; display: flex; flex-direction: column; gap: 10px; }
        input[type="text"], input[type="number"] { border-radius: 5px; border: 1px solid var(--border-color); padding: 10px; background: #EEE; }
        .submit-btn { background-color: var(--main-green); color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        .buy-list { padding: 0 20px; }
        .buy-item { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding: 12px 0; }
        input[type="checkbox"] { width: 25px; height: 25px; cursor: pointer; }
        .del-btn { background: none; border: none; cursor: pointer; font-size: 16px; padding: 5px; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <img src="Home (1).jpg" alt="Banner">
        <h2>豬二哥野外探險記</h2>
    </header>

    <div class="notice">
        <strong>必看公告</strong><br>
        • 地點：新竹尖石 自然野趣<br>
        • <a href="https://maps.app.goo.gl/YourMapLink" target="_blank">點我看地圖連結</a><br>
        • 時間：下午2點集合<br>
        • 收費：2000元/人 (可用Line Pay或轉帳備註人名)<br>
        • 帳號：(808) 0015977168920
    </div>

    <div class="section-title">認領物品 (點擊認領)</div>
    <div class="btn-grid">
        <div v-for="(obj, index) in options" :key="index" class="btn-item-wrapper">
            <div class="item-btn" @click="claimItem(obj)">{{ obj }}</div>
            <span class="del-opt" @click="removeOption(index)">✕</span>
        </div>
    </div>

    <div class="section-title">認領清單</div>
    <table>
        <thead>
            <tr><th>物品</th><th>名字</th><th>數量</th><th></th></tr>
        </thead>
        <tbody>
            <tr v-for="(claim, index) in claims" :key="index">
                <td>{{ claim.name }}</td>
                <td><input v-model="claim.user" @change="save" placeholder="誰領？" style="width:60px; text-align:center;"></td>
                <td><input v-model.number="claim.qty" @change="save" type="number" style="width:40px; text-align:center;"></td>
                <td><button class="del-btn" @click="removeClaim(index)">❌</button></td>
            </tr>
        </tbody>
    </table>

    <div class="section-title">管理：新增物品按鈕</div>
    <div class="input-group">
        <input v-model="newOption" placeholder="例如：大帳篷、卡式爐">
        <button class="submit-btn" @click="addOption">新增到認領區</button>
    </div>

    <div class="section-title">採買清單</div>
    <div class="buy-list">
        <div v-for="(buy, i) in shoppingList" :key="i" class="buy-item">
            <div>
                <input type="checkbox" v-model="buy.done" @change="save">
                <span :style="buy.done ? 'text-decoration: line-through; color: #777; margin-left:10px;' : 'margin-left:10px;'">{{ buy.name }}</span>
            </div>
            <button class="del-btn" @click="removeBuy(i)">❌</button>
        </div>
    </div>

    <div class="section-title">管理：新增採買項目</div>
    <div class="input-group">
        <input v-model="newBuy" placeholder="例如：五花肉 3 斤">
        <button class="submit-btn" @click="addBuy">新增到採買清單</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyBhxHE_Mc_O70QBIn-TCOC7bvtOqfEdNCg",
        authDomain: "my-camping-eca2c.firebaseapp.com",
        databaseURL: "https://my-camping-eca2c-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "my-camping-eca2c",
        storageBucket: "my-camping-eca2c.firebasestorage.app",
        messagingSenderId: "1035241407296",
        appId: "1:1035241407296:web:13c6dcf0cb6b52d1cf30a5",
        measurementId: "G-VF178VHSMH"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const { createApp } = Vue;
    createApp({
        data() {
            return {
                options: [], // 讓你可以自己從網頁新增
                claims: [],       
                shoppingList: [], 
                newOption: '',
                newBuy: ''
            }
        },
        methods: {
            claimItem(name) {
                this.claims.push({ name: name, user: '', qty: 1 });
                this.save();
            },
            addOption() {
                if(this.newOption) { 
                    if(!this.options.includes(this.newOption)) {
                        this.options.push(this.newOption); 
                    }
                    this.newOption = ''; 
                    this.save(); 
                }
            },
            removeOption(index) {
                if(confirm("要刪除這個物品按鈕嗎？")) {
                    this.options.splice(index, 1);
                    this.save();
                }
            },
            removeClaim(index) {
                if(confirm("要刪除這筆認領紀錄嗎？")) {
                    this.claims.splice(index, 1);
                    this.save();
                }
            },
            addBuy() {
                if(this.newBuy) { 
                    this.shoppingList.push({ name: this.newBuy, done: false }); 
                    this.newBuy = ''; 
                    this.save(); 
                }
            },
            removeBuy(index) {
                if(confirm("要從採買清單刪除嗎？")) {
                    this.shoppingList.splice(index, 1);
                    this.save();
                }
            },
            save() {
                db.ref('camping/').set({
                    options: JSON.parse(JSON.stringify(this.options)),
                    claims: JSON.parse(JSON.stringify(this.claims)),
                    shoppingList: JSON.parse(JSON.stringify(this.shoppingList))
                });
            }
        },
        mounted() {
            db.ref('camping/').on('value', (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    this.options = data.options || [];
                    this.claims = data.claims || [];
                    this.shoppingList = data.shoppingList || [];
                }
            });
        }
    }).mount('#app');
</script>
</body>
</html>
